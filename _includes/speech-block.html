<!-- SPEECH -->
<style>
  /* Hide pause by default, hide play when active */
  #pause-btn { display: none !important; }
  .speaking #play-btn { display: none !important; }
  .speaking #pause-btn { display: inline-block !important; }

  /* Mobile-friendly sizing */
  .audio-controls { margin: 1em 0; display: flex; gap: 10px; }
  .audio-controls button {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
    font-size: 16px;
    cursor: pointer;
  }
  #voice-select {
    padding: 8px 12px;
    font-size: 16px;
    border-radius: 6px;
    max-width: 10rem;
  }
</style>

<script src="/js/tts.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  if (window.TTS && typeof TTS.init === "function") {
    TTS.init({
      container: "#audio-container",
      voiceSelector: "#voice-select",

      textProvider: function () {
        const root = document.querySelector('.main-content, .markdown-body') || document.body;
        const startNode = (window.TTS_StartElement && root.contains(window.TTS_StartElement)) 
                          ? window.TTS_StartElement 
                          : root;
      
        const selectors = 'header, nav, .audio-controls, .tts-float-wrapper, script, style, #qrcode, h1, #skip-to-content';
        const textParts = [];
      
        // TreeWalker is highly efficient for large documents
        const walker = document.createTreeWalker(
          root, 
          NodeFilter.SHOW_ELEMENT | NodeFilter.SHOW_TEXT, 
          {
            acceptNode: (node) => {
              // 1. Skip if it matches our "junk" selectors
              if (node.nodeType === Node.ELEMENT_NODE && node.matches(selectors)) {
                return NodeFilter.FILTER_REJECT;
              }
              // 2. If we are using a startElement, skip nodes physically before it
              if (startNode !== root && node !== startNode && 
                  !(startNode.compareDocumentPosition(node) & Node.DOCUMENT_POSITION_FOLLOWING)) {
                return NodeFilter.FILTER_SKIP;
              }
              return NodeFilter.FILTER_ACCEPT;
            }
          }
        );
      
        let currentNode = walker.nextNode();
        while (currentNode) {
          // Only collect actual text nodes to avoid duplicate text from parent innerText
          if (currentNode.nodeType === Node.TEXT_NODE) {
            textParts.push(currentNode.textContent);
          }
          currentNode = walker.nextNode();
        }
      
        // Reset the global start trigger
        window.TTS_StartElement = null;
      
        // Join and clean up whitespace for the TTS engine
        return textParts.join('').replace(/\s\s+/g, ' ').trim();
      }
      
    });
  }
});
</script>

<div class="audio-controls" id="audio-container">
  <select id="voice-select"></select>
  <button id="play-btn" onclick="speechControl.play()">▶ Speak</button>
  <button id="pause-btn" onclick="speechControl.pause()">⏸ Pause</button>
  <button id="restart-btn" onclick="speechControl.restart()">🔄 Re-Speak</button>
</div>
