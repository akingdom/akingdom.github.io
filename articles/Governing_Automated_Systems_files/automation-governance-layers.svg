<svg width="820" height="560" viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
             font-size: 22px; font-weight: 600; fill: #111827; }
    .subtitle { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                font-size: 14px; fill: #374151; }
    .label { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
             font-size: 17px; font-weight: 600; fill: #111827; }
    .body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13.5px; fill: #374151; }
    .caption { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               font-size: 12px; fill: #6B7280; font-style: italic; }
    .arrow { stroke: #9CA3AF; stroke-width: 1.8; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9.5 3.5, 0 7" fill="#9CA3AF" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="45" text-anchor="middle" class="title">
    Three-Layer Governance Stack for Autonomous Systems
  </text>
  <text x="410" y="72" text-anchor="middle" class="subtitle">
    Permanent Foundation → Public Rulebook → Expert Handbook
  </text>

  <!-- Layer 1 -->
  <rect x="110" y="110" width="600" height="124"
        fill="#E0E7FF" stroke="#6366F1" stroke-width="2"
        rx="12" ry="12" />
  <text x="140" y="145" class="label">Layer 1 — Permanent Foundation</text>
  <text x="140" y="172" class="body">• Non‑negotiable protections: the strong must not devour the weak</text>
  <text x="140" y="194" class="body">• No AI legal personhood; AI is always a tool, never a citizen</text>
  <text x="140" y="216" class="body">• Humans remain final decision‑makers on life, liberty, and property</text>

  <!-- Arrow -->
  <line x1="410" y1="235" x2="410" y2="255" class="arrow" />

  <!-- Layer 2 -->
  <rect x="110" y="260" width="600" height="120"
        fill="#BAE6FD" stroke="#0EA5E9" stroke-width="2"
        rx="12" ry="12" />
  <text x="140" y="295" class="label">Layer 2 — Public Rulebook</text>
  <text x="140" y="322" class="body">• Sovereign, publicly knowable rules for AI development and deployment</text>
  <text x="140" y="344" class="body">• Updated through each system’s own processes (parliament, decree, courts, councils)</text>

  <!-- Arrow -->
  <line x1="410" y1="380" x2="410" y2="400" class="arrow" />

  <!-- Layer 3 -->
  <rect x="110" y="405" width="600" height="120"
        fill="#BBF7D0" stroke="#22C55E" stroke-width="2"
        rx="12" ry="12" />
  <text x="140" y="440" class="label">Layer 3 — Expert Handbook</text>
  <text x="140" y="467" class="body">• Technical standards, tests, and safety certifications</text>
  <text x="140" y="489" class="body">• Can issue rapid, temporary pauses on dangerous deployments (subject to review)</text>

  <!-- Caption -->
  <text x="410" y="540" text-anchor="middle" class="caption">
    Foundation sets boundaries → Rulebook translates them → Handbook implements and monitors
  </text>
</svg>
